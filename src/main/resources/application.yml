server:
  port: 8080

spring:
  application:
    name: ai-flash-sale

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ai_flash_schema
    username: root
    password: 11899746qa
    driverClassName: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3000ms

  mybatis-plus:
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: assign_id

  springdoc:
    swagger-ui:
      path: /swagger-ui.html

  kafka:
    bootstrap-servers: 127.0.0.1:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ai-flash-sale-order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.weijinchuan.aiflashsale.event

qwen:
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api-key: ${DASHSCOPE_API_KEY:}
  model: qwen-plus

wechat:
  pay:
    enabled: false
    app-id: ${WECHAT_PAY_APP_ID:}
    merchant-id: ${WECHAT_PAY_MERCHANT_ID:}
    merchant-serial-number: ${WECHAT_PAY_MERCHANT_SERIAL_NO:}
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:}
    private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH:}
    notify-url: ${WECHAT_PAY_NOTIFY_URL:http://localhost:8080/payments/wechat/native/notify}
    description-prefix: AI闪购订单

rag:
  knowledge-base-location: ai/knowledge-base.json
  bootstrap-from-classpath-on-startup: false
  ingestion:
    source: classpath-json
    chunk-size: 120
    chunk-overlap: 24
  retrieval:
    default-top-k: 4
    preview-length: 88
    max-candidate-docs: 300

ai-shopping:
  conversation:
    recent-message-limit: 8
    session-title-length: 18
  clarification:
    enabled: true
    short-query-length: 8
    recommendation-threshold: 2

outbox:
  retry:
    fixed-delay-ms: 10000
    batch-size: 20
    max-attempts: 8
    backoff-seconds: 30

order:
  timeout:
    minutes: 30
    close:
      fixed-delay-ms: 10000
      batch-size: 20
      # 设为 false 禁用旧的 Spring 定时任务扫描，改由 Kafka 延时队列驱动
      enabled: false
    nack:
      sleep-ms: 10000
    recovery:
      batch-size: 100

logging:
  level:
    org.apache.kafka: info
    com.weijinchuan.aiflashsale: info
